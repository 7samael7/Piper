stages:
  - test
  - package
  - release

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

go-tests:
  stage: test
  image: golang:1.25-bookworm
  cache:
    key: go-modules
    paths:
      - .cache/go-build
      - .cache/go-mod
  variables:
    GOCACHE: $CI_PROJECT_DIR/.cache/go-build
    GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  script:
    - cd engine
    - go test ./...

desktop-tests:
  stage: test
  image: node:24-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline
    - npm --workspace packages/shared-types run build
    - npm --workspace apps/desktop run typecheck

macos-dmg:
  stage: package
  tags:
    - macos
  needs:
    - go-tests
    - desktop-tests
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"
      node scripts/set-version.mjs "$VERSION"
      npm install --package-lock-only --ignore-scripts
      npm ci

      case "$(uname -m)" in
        arm64)
          ELECTRON_ARCH="arm64"
          GO_ARCH="arm64"
          ;;
        x86_64)
          ELECTRON_ARCH="x64"
          GO_ARCH="amd64"
          ;;
        *)
          echo "Unsupported macOS architecture: $(uname -m)" >&2
          exit 1
          ;;
      esac

      PIPER_UPDATE_API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/permalink/latest" \
      PIPER_UPDATE_RELEASE_URL="${CI_PROJECT_URL}/-/releases/permalink/latest" \
      node scripts/write-update-config.mjs

      (
        cd engine
        GOOS=darwin GOARCH="$GO_ARCH" go build -trimpath -ldflags="-s -w" -o bin/piper-engine ./cmd/daemon
      )

      npm --workspace apps/desktop run make -- --platform=darwin --arch="$ELECTRON_ARCH"

      mkdir -p dist
      DMG_SOURCE="$(find apps/desktop/out/make -type f -name '*.dmg' -print -quit)"
      test -n "$DMG_SOURCE"
      DMG_NAME="Piper-${VERSION}-${ELECTRON_ARCH}.dmg"
      cp "$DMG_SOURCE" "dist/$DMG_NAME"
      shasum -a 256 "dist/$DMG_NAME" > "dist/$DMG_NAME.sha256"

      PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/piper/${VERSION}/${DMG_NAME}"
      curl --fail-with-body --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/$DMG_NAME" "$PACKAGE_URL"
      curl --fail-with-body --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/$DMG_NAME.sha256" "${PACKAGE_URL}.sha256"

      {
        echo "RELEASE_VERSION=$VERSION"
        echo "DMG_NAME=$DMG_NAME"
        echo "PACKAGE_URL=$PACKAGE_URL"
        echo "CHECKSUM_NAME=$DMG_NAME.sha256"
        echo "CHECKSUM_URL=$PACKAGE_URL.sha256"
      } > release.env
  artifacts:
    name: "piper-${CI_COMMIT_TAG}"
    expire_in: 30 days
    paths:
      - dist/
    reports:
      dotenv: release.env

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  needs:
    - job: macos-dmg
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating Piper ${CI_COMMIT_TAG} release."
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Piper $CI_COMMIT_TAG"
    description: "Automated macOS release for Piper $CI_COMMIT_TAG."
    assets:
      links:
        - name: $DMG_NAME
          url: $PACKAGE_URL
          filepath: "/downloads/$DMG_NAME"
          link_type: package
        - name: $CHECKSUM_NAME
          url: $CHECKSUM_URL
          filepath: "/downloads/$CHECKSUM_NAME"
          link_type: other
