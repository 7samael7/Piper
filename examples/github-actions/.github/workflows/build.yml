name: Example Build

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      greeting:
        description: Message to print
        required: false
        default: Hello from Piper

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print environment
        env:
          INPUT_GREETING: ${{ inputs.greeting || 'Hello from Piper' }}
        run: |
          echo "Repository is mounted at $GITHUB_WORKSPACE"
          echo "Greeting: $INPUT_GREETING"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      NODE_ENV: test
    steps:
      - name: Run test placeholder
        run: |
          echo "Running local CI test step"
          echo "NODE_ENV=$NODE_ENV"
