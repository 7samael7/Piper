name: Example Build

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      greeting:
        description: Message to print
        required: false
        default: Hello from Piper

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Print environment
        env:
          INPUT_GREETING: ${{ inputs.greeting || 'Hello from Piper' }}
        run: |
          echo "Repository is mounted at $GITHUB_WORKSPACE"
          echo "Greeting: $INPUT_GREETING"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node: [24, 26]
    services:
      redis:
        image: redis:8
    env:
      NODE_ENV: test
    steps:
      - uses: actions/cache@v5
        with:
          key: example-${{ matrix.node }}
          path: .piper-example-cache
      - name: Run test placeholder
        run: |
          mkdir -p .piper-example-cache dist
          echo "Running local CI test step"
          echo "NODE_ENV=$NODE_ENV"
          echo "node=${{ matrix.node }}" > dist/result.txt
      - uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.node }}
          path: dist
