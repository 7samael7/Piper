name: local-ci

trigger:
  branches:
    include:
      - main

variables:
  CONFIGURATION: Debug

stages:
  - stage: Build
    jobs:
      - job: compile
        displayName: Compile
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - bash: |
              echo "Building from $BUILD_SOURCESDIRECTORY"
              echo "Reason: $BUILD_REASON"

  - stage: Test
    jobs:
      - job: unit
        displayName: Unit Tests
        strategy:
          matrix:
            node24:
              NODE_VERSION: "24"
            node26:
              NODE_VERSION: "26"
          maxParallel: 2
        steps:
          - task: Cache@2
            inputs:
              key: npm-$(NODE_VERSION)
              path: .npm
          - script: |
              echo "Running unit tests"
              echo "CONFIGURATION=$CONFIGURATION"
              mkdir -p dist
              echo "$NODE_VERSION" > dist/version.txt

      - job: publish
        displayName: Publish Artifact Placeholder
        dependsOn: unit
        steps:
          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: dist
              artifactName: azure-example
