stages:
  - build
  - test
  - deploy

image: ubuntu:22.04

variables:
  APP_ENV: local

build:
  stage: build
  script:
    - echo "Building from $CI_PROJECT_DIR"
    - echo "Event source: $CI_PIPELINE_SOURCE"

test:
  stage: test
  needs:
    - build
  services:
    - name: redis:7
      alias: redis
  cache:
    key: example-cache
    paths:
      - .cache
  script:
    - mkdir -p .cache reports
    - echo "Running tests"
    - echo "APP_ENV=$APP_ENV"
    - echo "ok" > reports/result.txt
  artifacts:
    name: test-reports
    paths:
      - reports

deploy:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    paths:
      - dist
  script:
    - echo "Deploy is visible but artifacts are unsupported locally"
