name: Conditions and Matrix
on: workflow_dispatch
jobs:
  test:
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu, debian]
        node: [24, 26]
        exclude:
          - os: debian
            node: 24
    services:
      redis:
        image: redis:8
    runs-on: ubuntu-latest
    steps:
      - id: version
        run: echo "value=26" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.version.outputs.value == '26' }}
        run: echo ok
