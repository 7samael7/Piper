name: Conditions and Matrix
on: workflow_dispatch
jobs:
  test:
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu, debian]
        node: [20, 22]
        exclude:
          - os: debian
            node: 20
    services:
      redis:
        image: redis:7
    runs-on: ubuntu-latest
    steps:
      - id: version
        run: echo "value=22" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.version.outputs.value == '22' }}
        run: echo ok
